type: specs.openrewrite.org/v1beta/recipe
name: com.fitness.attempt4.Stage3_J17_to_J21
displayName: Stage 3 — Java 17 to Java 21, idioms + final cleanup
description: |
  Runs under JDK 21. By the time we reach here, stage 2 has done all the
  Spring Boot 3 + Hibernate 6 + javax->jakarta heavy lifting (or for J17
  starting repos, those upgrades already happened in their baseline state).
  Stage 3 is the final source-level bump + Java 21 idiomatization.
recipeList:
- org.openrewrite.java.migrate.UpgradeJavaVersion:
    version: 21
- org.openrewrite.java.migrate.UpgradeToJava21
- org.openrewrite.java.RemoveUnusedImports
