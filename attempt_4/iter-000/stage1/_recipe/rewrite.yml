type: specs.openrewrite.org/v1beta/recipe
name: com.fitness.attempt4.Stage1_J8_to_J11
displayName: Stage 1 — Java 8 to Java 11, light touch
description: |
  Runs under JDK 11. Bumps the project's declared source level to 11 and lands
  forward-compatible dep upgrades that are safe on Spring Boot 2.x + Hibernate 5.x.
  No Spring Boot 3, no Jakarta migration here — those need JDK 17.
recipeList:
- org.openrewrite.java.migrate.UpgradeJavaVersion:
    version: 11
# Lombok: bump to a version that works under JDK 11+. 1.18.30+ adds JDK 21 support
# but the next-stage JDK 17 javac is happy with 1.18.30+ too, so we can land it here.
- org.openrewrite.java.dependencies.UpgradeDependencyVersion:
    groupId: org.projectlombok
    artifactId: lombok
    newVersion: 1.18.34
# MapStruct: 1.5.5.Final has Jakarta + JDK 21 annotation-proc fixes
- org.openrewrite.java.dependencies.UpgradeDependencyVersion:
    groupId: org.mapstruct
    artifactId: mapstruct
    newVersion: 1.5.5.Final
- org.openrewrite.java.dependencies.UpgradeDependencyVersion:
    groupId: org.mapstruct
    artifactId: mapstruct-processor
    newVersion: 1.5.5.Final
