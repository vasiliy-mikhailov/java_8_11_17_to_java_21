type: specs.openrewrite.org/v1beta/recipe
name: com.fitness.attempt4.Stage2_J11_to_J17
displayName: Stage 2 — Java 11 to Java 17, Spring Boot 2 to 3, Hibernate 5 to 6, javax to jakarta
description: |
  Runs under JDK 17. The biggest stage by volume — handles the Spring Boot 2 -> 3,
  Hibernate 5 -> 6, javax -> jakarta, JUnit 4 -> 5 transitions. The previous
  stage's Lombok 1.18.34 means OpenRewrite's LST parser doesn't crash here.
recipeList:
- org.openrewrite.java.migrate.UpgradeJavaVersion:
    version: 17

# Lombok / MapStruct safety re-bump (idempotent if stage 1 ran)
- org.openrewrite.java.dependencies.UpgradeDependencyVersion:
    groupId: org.projectlombok
    artifactId: lombok
    newVersion: 1.18.34
- org.openrewrite.java.dependencies.UpgradeDependencyVersion:
    groupId: org.mapstruct
    artifactId: mapstruct
    newVersion: 1.5.5.Final
- org.openrewrite.java.dependencies.UpgradeDependencyVersion:
    groupId: org.mapstruct
    artifactId: mapstruct-processor
    newVersion: 1.5.5.Final

# Hibernate 5 -> 6.x source migration
- org.openrewrite.hibernate.MigrateToHibernate63
- org.openrewrite.java.ChangeType:
    oldFullyQualifiedTypeName: org.hibernate.Query
    newFullyQualifiedTypeName: org.hibernate.query.Query

# Springfox -> SpringDoc
- org.openrewrite.java.dependencies.ChangeDependency:
    oldGroupId: io.springfox
    oldArtifactId: springfox-boot-starter
    newGroupId: org.springdoc
    newArtifactId: springdoc-openapi-starter-webmvc-ui
    newVersion: 2.6.x
- org.openrewrite.maven.RemoveDependency:
    groupId: io.springfox
    artifactId: springfox-swagger2
- org.openrewrite.maven.RemoveDependency:
    groupId: io.springfox
    artifactId: springfox-swagger-ui
- org.openrewrite.maven.AddDependency:
    groupId: org.springdoc
    artifactId: springdoc-openapi-starter-webmvc-ui
    version: 2.6.x
    onlyIfUsing: io.springfox.boot.starter.SpringfoxBootStarter
- org.openrewrite.maven.AddDependency:
    groupId: org.springdoc
    artifactId: springdoc-openapi-starter-webmvc-ui
    version: 2.6.x
    onlyIfUsing: springfox.documentation.spring.web.plugins.Docket

# Junit-jupiter availability for tests
- org.openrewrite.maven.AddDependency:
    groupId: org.junit.jupiter
    artifactId: junit-jupiter
    version: 5.11.x
    scope: test
    onlyIfUsing: org.junit.jupiter.api..*

# Spotbugs upgrade for JDK 17+ compat
- org.openrewrite.maven.UpgradePluginVersion:
    groupId: com.github.spotbugs
    artifactId: spotbugs-maven-plugin
    newVersion: 4.8.x
    addVersionIfMissing: true

# jakarta.validation-api conditional adds
- org.openrewrite.maven.UpgradeDependencyVersion:
    groupId: jakarta.validation
    artifactId: jakarta.validation-api
    newVersion: 3.x
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.validation
    artifactId: jakarta.validation-api
    version: 3.0.x
    onlyIfUsing: jakarta.validation.constraints.NotNull
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.validation
    artifactId: jakarta.validation-api
    version: 3.0.x
    onlyIfUsing: jakarta.validation.Valid
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.validation
    artifactId: jakarta.validation-api
    version: 3.0.x
    onlyIfUsing: javax.validation.constraints.NotNull
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.validation
    artifactId: jakarta.validation-api
    version: 3.0.x
    onlyIfUsing: org.hibernate.validator.constraints.NotBlank
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.interceptor
    artifactId: jakarta.interceptor-api
    version: 2.x
    onlyIfUsing: javax.interceptor.AroundInvoke
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.interceptor
    artifactId: jakarta.interceptor-api
    version: 2.x
    onlyIfUsing: javax.interceptor.InvocationContext

# Jakarta EE 10 source rewrite (javax.* -> jakarta.*)
- org.openrewrite.java.migrate.jakarta.JakartaEE10
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.servlet
    artifactId: jakarta.servlet-api
    version: 6.0.x
    scope: provided
    onlyIfUsing: jakarta.servlet.Filter
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.servlet
    artifactId: jakarta.servlet-api
    version: 6.0.x
    scope: provided
    onlyIfUsing: jakarta.servlet.ServletException
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.enterprise
    artifactId: jakarta.enterprise.cdi-api
    version: 4.0.x
    onlyIfUsing: jakarta.enterprise.inject.Produces
- org.openrewrite.java.spring.security5.WebSecurityConfigurerAdapter
- org.openrewrite.java.spring.security6.UpgradeSpringSecurity_6_0

# Code-level thymeleaf package swap
- org.openrewrite.java.ChangePackage:
    oldPackageName: org.thymeleaf.spring4
    newPackageName: org.thymeleaf.spring6
    recursive: true

# Framework + Boot upgrade chain
- org.openrewrite.java.spring.framework.UpgradeSpringFramework_6_1
- org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_3

# Drop EnableEurekaClient (no longer required in Spring Cloud 2023+)
- org.openrewrite.java.RemoveAnnotation:
    annotationPattern: '@org.springframework.cloud.netflix.eureka.EnableEurekaClient'

# Testing
- org.openrewrite.java.testing.junit5.JUnit4to5Migration
- org.openrewrite.maven.AddDependency:
    groupId: junit
    artifactId: junit
    version: 4.13.x
    scope: test
    onlyIfUsing: org.junit.runner.RunWith
- org.openrewrite.maven.AddDependency:
    groupId: junit
    artifactId: junit
    version: 4.13.x
    scope: test
    onlyIfUsing: org.junit.Rule
- org.openrewrite.java.testing.mockito.MockitoBestPractices

# Re-add jakarta.annotation-api stripped by JakartaEE10 / UpgradePluginsForJava17
# (proven landing in attempt_3 iter-1 pom diff)
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.annotation
    artifactId: jakarta.annotation-api
    version: 2.1.x
    onlyIfUsing: jakarta.annotation.PostConstruct
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.annotation
    artifactId: jakarta.annotation-api
    version: 2.1.x
    onlyIfUsing: jakarta.annotation.Generated
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.annotation
    artifactId: jakarta.annotation-api
    version: 2.1.x
    onlyIfUsing: javax.annotation.PostConstruct

# Bug-fix: after JakartaEE10 migrates source javax.persistence -> jakarta.persistence,
# the resulting pom lacks jakarta.persistence-api unless hibernate-core 6.x is in deps.
# Without this the next-stage JDK 21 cant compile.
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.persistence
    artifactId: jakarta.persistence-api
    version: 3.1.x
    onlyIfUsing: jakarta.persistence.Entity
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.persistence
    artifactId: jakarta.persistence-api
    version: 3.1.x
    onlyIfUsing: jakarta.persistence.MappedSuperclass
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.persistence
    artifactId: jakarta.persistence-api
    version: 3.1.x
    onlyIfUsing: jakarta.persistence.Id
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.persistence
    artifactId: jakarta.persistence-api
    version: 3.1.x
    onlyIfUsing: javax.persistence.Entity
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.persistence
    artifactId: jakarta.persistence-api
    version: 3.1.x
    onlyIfUsing: javax.persistence.MappedSuperclass
