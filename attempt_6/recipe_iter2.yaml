# Emitted by ff #1 composer (iter-2 v2).
# v2: dropped MigrateSpringBootServletInitializerPackageName — smoke showed it rewrites
# imports to Spring Boot 2.x package but doesn't bump the Boot parent, so projects still
# on Boot 1.x compile-fail. Net negative for marginal gain.
11:
  - org.openrewrite.java.migrate.Java8toJava11
  - recipe: org.openrewrite.java.migrate.javax.AddJaxbDependenciesWithRuntime
    if_pom_contains: ["javax.xml.bind"]
  - recipe: org.openrewrite.java.migrate.jacoco.UpgradeJaCoCo
    if_pom_contains: ["jacoco-maven-plugin"]
17:
  - org.openrewrite.java.migrate.UpgradeToJava17
  - recipe: org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_3
    if_pom_contains: ["spring-boot-starter"]
  - recipe: org.openrewrite.java.migrate.javax.AddJaxbDependenciesWithRuntime
    if_pom_contains: ["javax.xml.bind"]
  - recipe: org.openrewrite.java.migrate.jacoco.UpgradeJaCoCo
    if_pom_contains: ["jacoco-maven-plugin"]
21:
  - org.openrewrite.java.migrate.UpgradeToJava21
  - recipe: org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_3
    if_pom_contains: ["spring-boot-starter"]
  - recipe: org.openrewrite.java.migrate.javax.AddJaxbDependenciesWithRuntime
    if_pom_contains: ["javax.xml.bind"]
  - recipe: org.openrewrite.java.migrate.jacoco.UpgradeJaCoCo
    if_pom_contains: ["jacoco-maven-plugin"]
