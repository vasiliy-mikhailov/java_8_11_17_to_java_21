data_dir = "/var/lib/vector"

# Host resource metrics (the one synthesized stream).
[sources.host]
type = "host_metrics"
scrape_interval_secs = 60
collectors = ["cpu", "memory", "filesystem", "load"]

# (1) The whole /var/log tree — host + project process logs.
[sources.varlog]
type = "file"
read_from = "end"
include = ["/var/log/**/*"]
exclude = [
  "/var/log/observe/*.jsonl",
  "/var/log/observe/compactor.log",
  "/var/log/journal/**",
  "/var/log/**/*.gz",
  "/var/log/**/*.[0-9]",
  "/var/log/**/*.[0-9][0-9]",
  "/var/log/btmp", "/var/log/wtmp", "/var/log/lastlog", "/var/log/faillog",
]
ignore_older_secs = 600

# Identify files by inode, not by content checksum. The default checksum strategy reads
# the first bytes of each file, so files with identical headers (e.g. the many static CUDA
# uninstall manifests under /var/log/nvidia) collide -> "More than one file has the same
# fingerprint" spam and mis-tracked reads. device_and_inode is unique per file.
[sources.varlog.fingerprint]
strategy = "device_and_inode"

# (2) All Docker container stdout, file-based — auto-discovers every container
# (new ones appear as new files matching the glob; no per-container wiring, no API).
[sources.docker_files]
type = "file"
read_from = "end"
include = ["/var/lib/docker/containers/**/*-json.log"]
ignore_older_secs = 600

# Unwrap the docker json-file envelope ({"log","stream","time"}) so the digest sees
# the clean message, not raw JSON. We watch all containers' logs; no per-container id.
[transforms.docker_parse]
type = "remap"
inputs = ["docker_files"]
source = '''
wrapper = parse_json(.message) ?? {}
msg = string(wrapper.log) ?? string(.message) ?? ""
.message = strip_whitespace(msg)
'''

[transforms.host_as_log]
type = "metric_to_log"
inputs = ["host"]

[sinks.docker_jsonl]
type = "file"
inputs = ["docker_parse"]
path = "/var/log/observe/docker.jsonl"
encoding.codec = "json"

[sinks.host_jsonl]
type = "file"
inputs = ["host_as_log"]
path = "/var/log/observe/host_metrics.jsonl"
encoding.codec = "json"

[sinks.app_logs_jsonl]
type = "file"
inputs = ["varlog"]
path = "/var/log/observe/app_logs.jsonl"
encoding.codec = "json"
