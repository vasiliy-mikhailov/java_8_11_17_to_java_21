# Recipe pool the mutator draws from, and the seed composition.
# IDs and versions are anchored to OpenRewrite's published catalogue.

seed:
  # iter-2: split Spring framework vs Boot, force pom source/target >= 8 first.
  # Iter-1 found:
  #   * UpgradeSpringBoot_3_3 fires on non-Boot Spring repos and adds Boot-only
  #     imports that fail to resolve. Add Framework_6_1 first, before Boot_3_3.
  #   * source/target=7 in old EE samples isn't fixed by any seed recipe and
  #     bypassed by our compat flag, faking wins. UpgradeJavaVersion(21) at head
  #     bumps the pom properties before anything else runs.
  - org.openrewrite.java.migrate.UpgradeJavaVersion
  - org.openrewrite.java.migrate.jakarta.JakartaEE10
  - org.openrewrite.java.spring.framework.UpgradeSpringFramework_6_1
  - org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_3
  - org.openrewrite.hibernate.MigrateToHibernate62
  - org.openrewrite.java.testing.junit5.JUnit4to5Migration
  - org.openrewrite.java.testing.mockito.MockitoBestPractices
  - org.openrewrite.java.migrate.UpgradeToJava21
  - org.openrewrite.java.RemoveUnusedImports

pool:
  # Java version upgrades
  - org.openrewrite.java.migrate.UpgradeToJava21
  - org.openrewrite.java.migrate.UpgradeToJava17
  - org.openrewrite.java.migrate.UpgradeToJava11
  - org.openrewrite.java.migrate.lang.UseTextBlocks
  - org.openrewrite.java.migrate.lang.StringFormatted
  - org.openrewrite.java.migrate.lang.var.UseVarKeyword
  - org.openrewrite.java.migrate.util.SequencedCollection
  - org.openrewrite.java.migrate.RemovedLegacySunJSSEProviderName
  - org.openrewrite.java.migrate.ReplaceDeprecatedRuntimeExecMethods
  - org.openrewrite.java.migrate.UseJavaUtilBase64

  # Spring Boot
  - org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_5
  - org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_3
  - org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_2
  - org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_0
  - org.openrewrite.java.spring.boot3.SpringBoot3BestPractices
  - org.openrewrite.java.spring.boot2.UpgradeSpringBoot_2_7

  # JUnit + Mockito + AssertJ
  - org.openrewrite.java.testing.junit5.JUnit4to5Migration
  - org.openrewrite.java.testing.mockito.MockitoBestPractices
  - org.openrewrite.java.testing.mockito.Mockito3to4Migration
  - org.openrewrite.java.testing.mockito.Mockito1to3Migration
  - org.openrewrite.java.testing.assertj.JUnitToAssertj
  - org.openrewrite.java.testing.cleanup.BestPractices

  # Jakarta namespace
  - org.openrewrite.java.migrate.jakarta.JavaxMigrationToJakarta
  - org.openrewrite.java.migrate.jakarta.JavaxServletMigrationToJakartaServlet
  - org.openrewrite.java.migrate.jakarta.JavaxValidationMigrationToJakartaValidation
  - org.openrewrite.java.migrate.jakarta.JavaxXmlBindMigrationToJakartaXmlBind

  # Hibernate / Jackson / Lombok
  - org.openrewrite.hibernate.MigrateToHibernate61
  - org.openrewrite.hibernate.MigrateToHibernate62
  - org.openrewrite.hibernate.MigrateToHibernate66
  - org.openrewrite.java.migrate.jackson.UpgradeJacksonVersion_2_x
  - org.openrewrite.java.migrate.lombok.LombokBestPractices

  # Cleanup tail — small, always-safe
  - org.openrewrite.java.RemoveUnusedImports
  - org.openrewrite.java.OrderImports
  - org.openrewrite.java.format.AutoFormat
