services:
  caddy:
    image: caddy:2
    container_name: inference-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - proxy-net

  vllm:
    image: vllm/vllm-openai:v0.20.0-cu130-ubuntu2404
    container_name: inference-vllm
    restart: unless-stopped
    runtime: nvidia
    ipc: host
    env_file:
      - ../.env
    volumes:
      - /mnt/steam/forge/shared/models:/root/.cache/huggingface
    networks:
      - proxy-net
    command:
      - --model=Qwen/Qwen3.6-27B-FP8
      - --served-model-name=qwen-3.6-27b-fp8
      - --max-model-len=131072
      - --max-num-batched-tokens=4096
      - --max-num-seqs=128
      - --kv-cache-dtype=fp8
      - --gpu-memory-utilization=0.85
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --tool-call-parser=qwen3_xml
      - --trust-remote-code
      - --host=0.0.0.0
      - --port=8000
      - --api-key=${PROPOSER_API_KEY}

volumes:
  caddy-data:
  caddy-config:

networks:
  proxy-net:
    external: true
