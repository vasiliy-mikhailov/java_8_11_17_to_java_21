type: specs.openrewrite.org/v1beta/recipe
name: com.fitness.iter9.MigrateToJava21
displayName: Iter-9 (champion + custom composite for pom-level root causes)
recipeList:
# 1. Java version baseline
- org.openrewrite.java.migrate.UpgradeJavaVersion:
    version: 21

# 2. pom-level dep upgrades BEFORE code migrations
#    Force hibernate-core 6.x even when declared as direct dep (kills 'org.hibernate.annotations does not exist')
- org.openrewrite.maven.UpgradeDependencyVersion:
    groupId: org.hibernate
    artifactId: hibernate-core
    newVersion: 6.x
- org.openrewrite.maven.UpgradeDependencyVersion:
    groupId: org.hibernate.orm
    artifactId: hibernate-core
    newVersion: 6.x
- org.openrewrite.java.dependencies.ChangeDependency:
    oldGroupId: org.hibernate
    oldArtifactId: hibernate-entitymanager
    newGroupId: org.hibernate.orm
    newArtifactId: hibernate-core
    newVersion: 6.x

#    Springfox -> Springdoc coordinates (the part SpringFoxToSpringDoc misses)
- org.openrewrite.java.dependencies.ChangeDependency:
    oldGroupId: io.springfox
    oldArtifactId: springfox-boot-starter
    newGroupId: org.springdoc
    newArtifactId: springdoc-openapi-starter-webmvc-ui
    newVersion: 2.6.x
- org.openrewrite.maven.RemoveDependency:
    groupId: io.springfox
    artifactId: springfox-swagger2
- org.openrewrite.maven.RemoveDependency:
    groupId: io.springfox
    artifactId: springfox-swagger-ui

#    Thymeleaf spring4 -> spring6 (kills 'org.thymeleaf.spring4 does not exist')
- org.openrewrite.java.dependencies.ChangeDependency:
    oldGroupId: org.thymeleaf
    oldArtifactId: thymeleaf-spring4
    newGroupId: org.thymeleaf
    newArtifactId: thymeleaf-spring6
    newVersion: 3.1.x

#    Auto-add validation starter when @Valid is used
- org.openrewrite.maven.AddDependency:
    groupId: org.springframework.boot
    artifactId: spring-boot-starter-validation
    version: 3.3.x
    onlyIfUsing: javax.validation.Valid
- org.openrewrite.maven.AddDependency:
    groupId: org.springframework.boot
    artifactId: spring-boot-starter-validation
    version: 3.3.x
    onlyIfUsing: jakarta.validation.Valid

#    Spring Boot Maven plugin to 3.x (kills the 2.5.6:repackage failure)
- org.openrewrite.maven.UpgradePluginVersion:
    groupId: org.springframework.boot
    artifactId: spring-boot-maven-plugin
    newVersion: 3.3.x

# 2c. More targeted dep ops
- org.openrewrite.maven.AddDependency:
    groupId: org.junit.jupiter
    artifactId: junit-jupiter
    version: 5.11.x
    scope: test
    onlyIfUsing: org.junit.jupiter.api..*
- org.openrewrite.maven.UpgradePluginVersion:
    groupId: com.github.spotbugs
    artifactId: spotbugs-maven-plugin
    newVersion: 4.8.x
- org.openrewrite.maven.UpgradeDependencyVersion:
    groupId: jakarta.validation
    artifactId: jakarta.validation-api
    newVersion: 3.x
- org.openrewrite.maven.AddDependency:
    groupId: org.springdoc
    artifactId: springdoc-openapi-starter-webmvc-ui
    version: 2.6.x
    onlyIfUsing: io.swagger.annotations.Api
- org.openrewrite.maven.AddDependency:
    groupId: org.springdoc
    artifactId: springdoc-openapi-starter-webmvc-ui
    version: 2.6.x
    onlyIfUsing: io.swagger.annotations.ApiOperation
- org.openrewrite.maven.AddDependency:
    groupId: org.springdoc
    artifactId: springdoc-openapi-starter-webmvc-ui
    version: 2.6.x
    onlyIfUsing: springfox.documentation.spring.web.plugins.Docket
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.interceptor
    artifactId: jakarta.interceptor-api
    version: 2.x
    onlyIfUsing: javax.interceptor.AroundInvoke
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.interceptor
    artifactId: jakarta.interceptor-api
    version: 2.x
    onlyIfUsing: javax.interceptor.InvocationContext
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.interceptor
    artifactId: jakarta.interceptor-api
    version: 2.x
    onlyIfUsing: jakarta.interceptor.AroundInvoke
- org.openrewrite.maven.AddDependency:
    groupId: jakarta.interceptor
    artifactId: jakarta.interceptor-api
    version: 2.x
    onlyIfUsing: jakarta.interceptor.InvocationContext

# 3. Jakarta + Spring Security cleanup BEFORE framework/boot upgrade
- org.openrewrite.java.migrate.jakarta.JakartaEE10
- org.openrewrite.java.spring.security5.WebSecurityConfigurerAdapter
- org.openrewrite.java.spring.security6.UpgradeSpringSecurity_6_0

# 4. Code-level thymeleaf package swap
- org.openrewrite.java.ChangePackage:
    oldPackageName: org.thymeleaf.spring4
    newPackageName: org.thymeleaf.spring6
- org.openrewrite.java.ChangePackage:
    oldPackageName: org.thymeleaf.spring4.templateresolver
    newPackageName: org.thymeleaf.spring6.templateresolver

# 5. Framework + Boot upgrade
- org.openrewrite.java.spring.framework.UpgradeSpringFramework_6_1
- org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_3

# 6. Hibernate source migration
- org.openrewrite.hibernate.MigrateToHibernate63

# 7. Testing
- org.openrewrite.java.testing.junit5.JUnit4to5Migration
- org.openrewrite.maven.AddDependency:
    groupId: junit
    artifactId: junit
    version: 4.13.x
    scope: test
    onlyIfUsing: org.junit.rules.ExpectedException
- org.openrewrite.maven.AddDependency:
    groupId: junit
    artifactId: junit
    version: 4.13.x
    scope: test
    onlyIfUsing: org.junit.rules.TestRule
- org.openrewrite.maven.AddDependency:
    groupId: junit
    artifactId: junit
    version: 4.13.x
    scope: test
    onlyIfUsing: org.junit.runner.RunWith
- org.openrewrite.maven.AddDependency:
    groupId: junit
    artifactId: junit
    version: 4.13.x
    scope: test
    onlyIfUsing: org.junit.Rule
- org.openrewrite.java.testing.mockito.MockitoBestPractices

# 8. Java 21 idioms + cleanup
- org.openrewrite.java.migrate.UpgradeToJava21
- org.openrewrite.java.RemoveUnusedImports
